name: Film Vitrinini Guncelle

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Kütüphaneleri Yükle
        run: pip install requests beautifulsoup4

      - name: Botu Çalıştır (ZenRows ile Filmleri Çek)
        run: python scraper.py

      - name: Değişiklikleri GitHub'a Kaydet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🤖 Vitrin Güncellendi" || echo "Kaydedilecek yeni bir sey yok."
          git push || echo "Gonderim hatasi."
